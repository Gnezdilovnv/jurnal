name: AI Code Review
on: 
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]
  workflow_dispatch:

jobs:
  review:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'
      - name: AI Review
        env:
          DEEPSEEK_API_KEY: ${{ secrets.DEEPSEEK_API_KEY }}
        run: |
          python -c "
          import os, subprocess, openai
          client = openai.OpenAI(api_key=os.environ['DEEPSEEK_API_KEY'], base_url='https://api.deepseek.com/v1')
          files = [f for f in subprocess.check_output(['git', 'diff', '--name-only', 'HEAD~1', 'HEAD']).decode().split() if f.endswith('.kt')]
          for f in files:
              with open(f, 'r') as file:
                  code = file.read()
              if len(code) > 10:
                  resp = client.chat.completions.create(
                      model='deepseek-coder',
                      messages=[{'role': 'system', 'content': 'Найди ошибки в Kotlin коде'}, {'role': 'user', 'content': f'Файл: {f}\n\n{code}'}],
                      max_tokens=1000
                  )
                  print(f'\n📄 {f}\n{resp.choices[0].message.content}')
          "
